- name: install packages from maps
  hosts: local
  connection: local
  become: yes
  tasks:
  - name: install and uninstall packages
    ansible.builtin.package:
      name: "{{item.name}}"
      state: "{{item.state}}"

    loop:
    - {name: "nginx", state: "absent"}
    - {name: "redis", state: "latest"}
    - {name: "mysql", state: "absent"}
    